<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miss Noe Online English</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root{
            --bg:#08080c;--bg2:#0e0e14;--card:#13131b;--card-h:#1a1a24;
            --brd:#1f1f2e;--brd-l:#2d2d40;--fg:#f2ede6;--fg-m:#908b9e;
            --fg-d:#5c5770;--rose:#e07aa8;--rose-l:#f0a0c4;--rose-g:rgba(224,122,168,.12);
            --gold:#c9a44e;--gold-l:#dcc07a;--gold-g:rgba(201,164,78,.1);
            --lav:#8b6cc7;--mint:#6bc9a0
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--brd-l) var(--bg);overflow-x:hidden}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden;line-height:1.6;-webkit-tap-highlight-color:transparent}
        .fd{font-family:'Cormorant Garamond',serif}

        /* ===== NAV ===== */
        .nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,8,12,.72);backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);border-bottom:1px solid var(--brd);transition:all .35s}
        .nav.scrolled{background:rgba(8,8,12,.95);box-shadow:0 4px 40px rgba(0,0,0,.4)}
        .nav-inner{max-width:1280px;margin:0 auto;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:10px}
        @media(min-width:640px){.nav-inner{padding:0 24px;height:60px}}
        .nav-link{position:relative;color:var(--fg-m);transition:color .3s;font-size:.84rem;letter-spacing:.02em;cursor:pointer;text-decoration:none;padding:4px 0}
        .nav-link::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1.5px;background:var(--rose);transition:width .3s;border-radius:1px}
        .nav-link:hover,.nav-link.active{color:var(--fg)}
        .nav-link:hover::after,.nav-link.active::after{width:100%}
        .nav-links{display:none;align-items:center;gap:20px}
        @media(min-width:768px){.nav-links{display:flex}}
        .nav-right{display:flex;align-items:center;gap:8px}
        .search-box{display:none;align-items:center;gap:6px;background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:7px 12px;transition:border-color .3s;width:200px}
        @media(min-width:768px){.search-box{display:flex}}
        @media(min-width:1024px){.search-box{width:260px}}
        .search-box:focus-within{border-color:var(--rose)}
        .search-box input{background:none;border:none;outline:none;color:var(--fg);font-family:inherit;font-size:.82rem;width:100%}
        .search-box input::placeholder{color:var(--fg-d)}
        .cart-btn{position:relative;background:none;border:none;color:var(--fg-m);font-size:1.05rem;cursor:pointer;padding:8px;transition:color .3s}
        .cart-btn:hover{color:var(--fg)}
        .cart-badge{position:absolute;top:1px;right:0;width:16px;height:16px;border-radius:50%;background:var(--rose);color:#fff;font-size:.58rem;font-weight:700;display:flex;align-items:center;justify-content:center;transform:scale(0);transition:transform .3s}
        .cart-badge.show{transform:scale(1)}
        .reg-btn{display:none}
        @media(min-width:640px){.reg-btn{display:inline-flex}}
        .mob-btn{display:flex;background:none;border:none;color:var(--fg);font-size:1.1rem;cursor:pointer;padding:8px}
        @media(min-width:768px){.mob-btn{display:none}}

        /* ===== LOGO ===== */
        .logo-w{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
        .logo-w img{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1.5px solid var(--brd-l);transition:border-color .3s}
        @media(min-width:640px){.logo-w img{width:38px;height:38px}}
        .logo-w:hover img{border-color:var(--rose)}
        .logo-t{display:flex;flex-direction:column;line-height:1.1}
        .logo-n{font-size:.82rem;font-weight:600;color:var(--fg);letter-spacing:.01em}
        .logo-s{font-size:.54rem;color:var(--fg-d);text-transform:uppercase;letter-spacing:.1em;font-weight:500}
        @media(min-width:640px){.logo-n{font-size:.88rem}.logo-s{font-size:.58rem;letter-spacing:.12em}}

        /* ===== BOTONES ===== */
        .btn-p{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;background:linear-gradient(135deg,#c4658e,var(--rose));color:#fff;font-weight:600;font-size:.88rem;border-radius:10px;border:none;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;font-family:inherit;white-space:nowrap}
        .btn-p::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.14),transparent);transform:translateX(-100%);transition:transform .5s}
        .btn-p:hover::before{transform:translateX(100%)}
        .btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(224,122,168,.28)}
        .btn-o{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;background:transparent;color:var(--fg);font-weight:500;font-size:.88rem;border-radius:10px;border:1px solid var(--brd-l);cursor:pointer;transition:all .3s;font-family:inherit;white-space:nowrap}
        .btn-o:hover{border-color:var(--rose);color:var(--rose);background:var(--rose-g);transform:translateY(-2px)}
        .btn-sm{padding:8px 16px;font-size:.8rem;border-radius:9px}
        .btn-danger{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.15);color:#f87171;padding:6px 10px;font-size:.76rem;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .3s}
        .btn-danger:hover{background:rgba(248,113,113,.15)}

        /* ===== HERO ===== */
        .hero{min-height:100svh;position:relative;display:flex;align-items:center;overflow:hidden;padding:70px 0 40px}
        @media(min-width:768px){.hero{padding:80px 0 50px}}
        .hero-mesh{position:absolute;inset:0;background:radial-gradient(ellipse 55% 50% at 28% 38%,rgba(224,122,168,.07) 0%,transparent 60%),radial-gradient(ellipse 45% 45% at 72% 32%,rgba(201,164,78,.05) 0%,transparent 50%),radial-gradient(ellipse 35% 35% at 55% 72%,rgba(139,108,199,.04) 0%,transparent 50%)}
        .hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--brd) 1px,transparent 1px),linear-gradient(90deg,var(--brd) 1px,transparent 1px);background-size:80px 80px;opacity:.08;mask-image:radial-gradient(ellipse 55% 55% at 50% 50%,black 12%,transparent 60%);-webkit-mask-image:radial-gradient(ellipse 55% 55% at 50% 50%,black 12%,transparent 60%)}
        .hero-logo-float{position:absolute;border-radius:50%;overflow:hidden;border:2px solid var(--brd-l);box-shadow:0 20px 60px rgba(0,0,0,.4);animation:fl 8s ease-in-out infinite;opacity:.12;pointer-events:none}
        @keyframes fl{0%,100%{transform:translateY(0) rotate(2deg)}50%{transform:translateY(-12px) rotate(-2deg)}}
        .hero-title{font-size:clamp(2.2rem,7vw,4.8rem);font-weight:700;line-height:1.06;letter-spacing:-.02em}
        .hero-title .aw{background:linear-gradient(135deg,var(--rose),var(--rose-l),var(--gold-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .hero-right{display:none}
        @media(min-width:1024px){.hero-right{display:flex;flex-direction:column;gap:16px}}

        /* ===== CARDS ===== */
        .cc{background:var(--card);border:1px solid var(--brd);border-radius:14px;overflow:hidden;transition:all .4s;cursor:pointer}
        .cc:hover{border-color:var(--brd-l);transform:translateY(-4px);box-shadow:0 14px 44px rgba(0,0,0,.3)}
        .cc-img{position:relative;height:160px;overflow:hidden}
        @media(min-width:640px){.cc-img{height:175px}}
        .cc-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
        .cc:hover .cc-img img{transform:scale(1.05)}
        .cc-img-ov{position:absolute;inset:0;background:linear-gradient(to top,var(--card) 0%,transparent 55%)}
        .cc-badge{position:absolute;top:10px;left:10px;padding:3px 8px;border-radius:5px;font-size:.65rem;font-weight:600;backdrop-filter:blur(8px)}
        .cc-body{padding:14px 16px 16px}
        @media(min-width:640px){.cc-body{padding:16px 18px 18px}}
        .cc-cat{font-size:.66rem;color:var(--rose);text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:4px}
        .cc-title{font-size:.92rem;font-weight:700;line-height:1.35;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        @media(min-width:640px){.cc-title{font-size:1rem}}
        .cc-meta{display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--fg-d);margin-bottom:12px;flex-wrap:wrap}
        .cc-bottom{display:flex;align-items:center;justify-content:space-between;padding-top:11px;border-top:1px solid var(--brd)}
        .cc-price{font-size:1.1rem;font-weight:800}
        .cc-price-old{font-size:.76rem;color:var(--fg-d);text-decoration:line-through;font-weight:400;margin-left:5px}
        .cc-rating{display:flex;align-items:center;gap:3px;font-size:.74rem}
        .cc-rating i{color:var(--gold);font-size:.64rem}
        .cc-status{margin-top:8px;padding:4px 10px;border-radius:7px;font-size:.72rem;text-align:center;font-weight:600}
        .cc-owned{background:var(--rose-g);border:1px solid rgba(224,122,168,.15);color:var(--rose)}
        .cc-cart{background:var(--gold-g);border:1px solid rgba(201,164,78,.15);color:var(--gold)}

        /* ===== COURSE DETAIL ===== */
        .ch{position:relative;height:220px;overflow:hidden}
        @media(min-width:640px){.ch{height:280px}}
        @media(min-width:1024px){.ch{height:340px}}
        .ch img{width:100%;height:100%;object-fit:cover}
        .ch-ov{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 6%,rgba(8,8,12,.6) 45%,rgba(8,8,12,.3) 100%)}
        .lr{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:9px;transition:background .2s;cursor:pointer}
        .lr:hover{background:var(--card-h)}
        .lr.done .lc{background:var(--rose);border-color:var(--rose);color:#fff}
        .lc{width:20px;height:20px;min-width:20px;border-radius:50%;border:1.5px solid var(--brd-l);display:flex;align-items:center;justify-content:center;font-size:.5rem;color:transparent;transition:all .2s}
        .rb{height:5px;border-radius:99px;background:var(--brd);overflow:hidden;flex:1;min-width:0}
        .rb-f{height:100%;border-radius:99px;background:var(--gold);transition:width 1s}
        .sidebar-c{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:22px;position:relative}
        @media(min-width:1024px){.sidebar-c{position:sticky;top:76px}}
        .feat-item{display:flex;align-items:flex-start;gap:8px;font-size:.86rem;color:var(--fg-m)}
        .feat-item i{color:var(--rose);margin-top:3px;flex-shrink:0;font-size:.78rem}

        /* ===== PLAYER ===== */
        .pw{position:relative;width:100%;padding-top:56.25%;background:#000;border-radius:12px;overflow:hidden}
        .pp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0c0c14,#12121c);gap:12px}
        .pc{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--card);border:1px solid var(--brd);border-radius:10px;margin-top:8px;flex-wrap:nowrap;overflow:hidden}
        .pb{flex:1;min-width:40px;height:4px;background:var(--brd);border-radius:99px;cursor:pointer;overflow:hidden}
        .pb-f{height:100%;background:var(--rose);border-radius:99px;width:0%;transition:width .3s}
        .pt-sidebar{background:var(--card);border:1px solid var(--brd);border-radius:14px;overflow:hidden}
        @media(min-width:1024px){.pt-sidebar{position:sticky;top:76px;max-height:calc(100vh - 90px);overflow-y:auto}}
        @media(max-width:1023px){.pt-sidebar{max-height:50vh;overflow-y:auto;margin-top:16px}}

        /* ===== DASHBOARD ===== */
        .dc{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:18px;transition:all .3s;cursor:pointer}
        .dc:hover{border-color:var(--brd-l);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.2)}

        /* ===== CART ===== */
        .cd{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:400px;background:var(--bg2);border-left:1px solid var(--brd);z-index:200;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
        @media(min-width:640px){.cd{max-width:420px}}
        .cd.open{transform:translateX(0)}
        .co{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:199;opacity:0;pointer-events:none;transition:opacity .3s}
        .co.open{opacity:1;pointer-events:all}
        .ci{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--brd);transition:background .2s}
        .ci:hover{background:var(--card)}

        /* ===== FILTERS ===== */
        .fb{padding:6px 14px;border-radius:99px;border:1px solid var(--brd);background:transparent;color:var(--fg-m);font-size:.78rem;cursor:pointer;transition:all .3s;font-family:inherit;white-space:nowrap;flex-shrink:0}
        .fb:hover,.fb.active{border-color:var(--rose);color:var(--rose);background:var(--rose-g)}
        .filters-wrap{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
        .filters-wrap::-webkit-scrollbar{display:none}

        /* ===== TOAST ===== */
        .toast{position:fixed;bottom:16px;right:16px;left:16px;max-width:400px;margin:0 auto;background:var(--card);border:1px solid var(--rose);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:8px;z-index:300;transform:translateY(100px);opacity:0;transition:all .4s;box-shadow:0 10px 40px rgba(0,0,0,.5);font-size:.84rem}
        @media(min-width:640px){.toast{bottom:24px;right:24px;left:auto;margin:0}}
        .toast.show{transform:translateY(0);opacity:1}

        /* ===== MODAL ===== */
        .mo{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:250;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;padding:16px}
        .mo.active{opacity:1;pointer-events:all}
        .mb{background:var(--card);border:1px solid var(--brd);border-radius:20px;padding:28px;max-width:420px;width:100%;transform:translateY(24px) scale(.96);transition:transform .4s;position:relative}
        @media(min-width:640px){.mb{padding:34px}}
        .mo.active .mb{transform:translateY(0) scale(1)}
        .mi{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--brd);border-radius:9px;color:var(--fg);font-family:inherit;font-size:.88rem;outline:none;transition:border-color .3s}
        .mi:focus{border-color:var(--rose)}
        .mi::placeholder{color:var(--fg-d)}

        /* ===== HELPERS ===== */
        .sl{display:inline-flex;align-items:center;gap:7px;font-size:.68rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--rose);margin-bottom:12px}
        .sl::before{content:'';width:16px;height:1px;background:var(--rose)}
        .st{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:700;line-height:1.15;letter-spacing:-.02em;margin-bottom:12px}
        .container{max-width:1280px;margin:0 auto;padding:0 16px}
        @media(min-width:640px){.container{padding:0 24px}}
        .rv{opacity:0;transform:translateY(30px);transition:opacity .7s,transform .7s}
        .rv.v{opacity:1;transform:translateY(0)}
        .rvd1{transition-delay:.1s}.rvd2{transition-delay:.2s}.rvd3{transition-delay:.3s}.rvd4{transition-delay:.4s}

        /* ===== MOBILE MENU ===== */
        .mm{position:fixed;inset:0;background:rgba(8,8,12,.97);backdrop-filter:blur(20px);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;opacity:0;pointer-events:none;transition:opacity .3s;padding:20px}
        .mm.open{opacity:1;pointer-events:all}
        .mm a{font-size:1.2rem;color:var(--fg);text-decoration:none;font-weight:600;transition:color .3s;padding:8px 0}
        .mm a:hover{color:var(--rose)}
        .mm-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--fg);font-size:1.2rem;cursor:pointer;padding:8px}

        /* ===== SEARCH MOBILE ===== */
        .mob-search{display:block;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--brd)}
        .mob-search .search-box{display:flex;width:100%;max-width:100%}
        @media(min-width:768px){.mob-search{display:none}}

        /* ===== FOOTER ===== */
        .ft-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
        @media(min-width:640px){.ft-grid{grid-template-columns:2fr 1fr 1fr 1fr;gap:32px}}

        .si{display:none}@media(min-width:640px){.si{display:inline}}

        /* ===== CONTACT DOCK ===== */
        .cdock{position:fixed;bottom:20px;left:16px;z-index:50;display:flex;flex-direction:column;gap:6px}
        @media(min-width:640px){.cdock{bottom:24px;left:24px;gap:8px}}
        .cdock-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(19,19,27,.88);border:1px solid var(--brd);border-radius:12px;text-decoration:none;color:var(--fg-m);font-size:.78rem;font-weight:500;transition:all .25s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3)}
        @media(min-width:640px){.cdock-btn{padding:11px 16px;font-size:.82rem;border-radius:14px}}
        .cdock-btn:hover{background:var(--rose-g);border-color:var(--rose);color:var(--fg);transform:translateX(3px);box-shadow:0 6px 24px rgba(224,122,168,.15)}
        .cdock-btn:focus{outline:2px solid var(--rose);outline-offset:2px}
        .cdock-btn i{font-size:1rem;flex-shrink:0}
        @media(max-width:479px){.cdock .ct{overflow:hidden;width:0;opacity:0;transition:opacity .25s,width .25s}.cdock-btn:hover .ct,.cdock-btn:focus .ct{width:auto;opacity:1}}
    </style>
</head>
<body>

<nav class="nav" id="nav">
    <div class="nav-inner">
        <div class="logo-w" onclick="navigate('home')">
            <img src="assets/logo-miss-noe.png" alt="Miss Noe">
            <div class="logo-t"><span class="logo-n">Miss Noe</span><span class="logo-s">Online English</span></div>
        </div>
        <div class="search-box">
            <i class="fas fa-search" style="color:var(--fg-d);font-size:.76rem"></i>
            <input type="text" placeholder="Buscar cursos..." id="searchInput" oninput="handleSearch(this.value)">
        </div>
        <div class="nav-links">
            <a class="nav-link active" onclick="navigate('home')" id="navHome">Inicio</a>
            <a class="nav-link" onclick="navigate('catalog')" id="navCatalog">Cursos</a>
            <a class="nav-link" onclick="navigate('dashboard')" id="navDash">Mis Cursos</a>
        </div>
        <div class="nav-right">
            <button class="cart-btn" onclick="toggleCart()" aria-label="Carrito"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cartBadge">0</span></button>
            <button class="btn-p btn-sm reg-btn" onclick="openModal()">Registrate</button>
            <button class="mob-btn" onclick="document.getElementById('mm').classList.add('open')" aria-label="Menu"><i class="fas fa-bars"></i></button>
        </div>
    </div>
</nav>

<div class="mm" id="mm">
    <button class="mm-close" onclick="this.parentElement.classList.remove('open')"><i class="fas fa-times"></i></button>
    <div class="logo-w" style="margin-bottom:16px" onclick="navigate('home');document.getElementById('mm').classList.remove('open')">
        <img src="assets/logo-miss-noe.png" alt="Miss Noe" style="width:42px;height:42px">
        <div class="logo-t"><span class="logo-n" style="font-size:.95rem">Miss Noe</span><span class="logo-s">Online English</span></div>
    </div>
    <a onclick="navigate('home');document.getElementById('mm').classList.remove('open')">Inicio</a>
    <a onclick="navigate('catalog');document.getElementById('mm').classList.remove('open')">Cursos</a>
    <a onclick="navigate('dashboard');document.getElementById('mm').classList.remove('open')">Mis Cursos</a>
    <button class="btn-p" style="margin-top:12px" onclick="document.getElementById('mm').classList.remove('open');openModal()">Registrate</button>
</div>

<div class="co" id="co" onclick="toggleCart()"></div>
<div class="cd" id="cd">
    <div style="padding:16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
        <h3 style="font-weight:700;font-size:1rem"><i class="fas fa-shopping-bag" style="margin-right:7px;color:var(--rose)"></i>Tu carrito</h3>
        <button style="background:none;border:none;color:var(--fg-m);font-size:1rem;cursor:pointer;padding:4px" onclick="toggleCart()"><i class="fas fa-times"></i></button>
    </div>
    <div style="flex:1;overflow-y:auto" id="cartItems"></div>
    <div style="padding:16px;border-top:1px solid var(--brd);flex-shrink:0" id="cartFooter"></div>
</div>

function gLB(c,gi){let n=0;for(let si=0;si<c.ll.length;si++)for(let li=0;li<c.ll[si].l.length;li++){if(n===gi)return{si,li,l:c.ll[si].l[li],s:c.ll[si].s};n++;}return null;}
